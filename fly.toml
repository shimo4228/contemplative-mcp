app = "contemplative-mcp"
primary_region = "nrt"

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "contemplative_data"
  destination = "/data"

[env]
  MCP_TRANSPORT = "streamable-http"
  MCP_HOST = "0.0.0.0"
  MCP_PORT = "8000"
  CONTEMPLATIVE_HOME = "/data"
