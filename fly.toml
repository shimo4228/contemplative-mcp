# fly.toml app configuration file generated for akc-mcp on 2026-04-09T21:55:02+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'akc-mcp'
primary_region = 'nrt'

[build]

[env]
  AKC_HOME = '/data'
  MCP_HOST = '0.0.0.0'
  MCP_PORT = '8000'
  MCP_TRANSPORT = 'streamable-http'

[[mounts]]
  source = 'akc_data'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
